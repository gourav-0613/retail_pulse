<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- ============================================================
       RetailPulse — Flat Vector Logo (icon + wordmark only)
       100% transparent background. No gradients inside the icon.
       ============================================================ -->

  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1D4ED8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ===================== ICON GROUP ===================== -->
  <g filter="url(#softShadow)">
    <rect x="192" y="140" width="640" height="640" rx="148" fill="#3B82F6"/>

    <g>
      <rect x="316" y="520" width="70" height="140" rx="16" fill="#FFFFFF" fill-opacity="0.35"/>
      <rect x="410" y="450" width="70" height="210" rx="16" fill="#FFFFFF" fill-opacity="0.55"/>
      <rect x="504" y="380" width="70" height="280" rx="16" fill="#FFFFFF" fill-opacity="0.75"/>
      <rect x="598" y="320" width="70" height="340" rx="16" fill="#FFFFFF"/>
    </g>

    <path d="M 260 580
             L 350 580
             L 388 500
             L 430 640
             L 470 420
             L 512 580
             L 638 580
             L 668 500
             L 700 580
             L 764 580"
          fill="none"
          stroke="#60A5FA"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <g>
      <circle cx="668" cy="320" r="26" fill="#FFFFFF"/>
      <circle cx="668" cy="320" r="26" fill="none" stroke="#60A5FA" stroke-width="8"/>
      <path d="M 700 252 L 748 240 L 736 288 Z" fill="#FFFFFF"/>
      <path d="M 636 364 L 668 320" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
      <path d="M 668 320 L 720 256" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ===================== WORDMARK ONLY ===================== -->
  <text x="512" y="880"
        text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="104"
        letter-spacing="-1"
        fill="#0F172A">Retail<tspan fill="#3B82F6">Pulse</tspan></text>

</svg>
